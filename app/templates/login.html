{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block internal_css %}
<style>
    .login-container { min-height: 100vh; }
    .login-card {
        background: var(--bg-surface) !important;
        border: 0.5px solid var(--border-glass) !important;
        border-radius: 1rem;
        overflow: hidden;
    }
    .login-image {
        background: linear-gradient(135deg, #1a1f2e, #0d1117);
        border-right: 0.5px solid rgba(99,102,241,0.3);
        display: flex; align-items: center; justify-content: center;
        color: white; padding: 3rem;
    }
    .form-section { padding: 3rem; }
    .btn-primary, .form-control { border-radius: 0.5rem; }
</style>
{% endblock %}

{% block content %}
<div class="container login-container d-flex align-items-center justify-content-center">
    <div class="card shadow-lg login-card col-lg-10">
        <div class="row g-0">

            <div class="col-lg-6 d-none d-lg-flex login-image">
                <div class="text-center">
                    <h2 class="mt-4 fw-bold">Welcome Back</h2>
                    <p class="lead">Sign in to continue to the app</p>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="form-section">
                    <h3 class="fw-bold mb-4">Login</h3>

                    {% for message in get_flashed_messages(request) %}
                    <div class="alert alert-{{ message.type }}" role="alert">{{ message.message }}</div>
                    {% endfor %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                        </div>
                    </form>

                    <div class="d-grid">
                        <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('register_view') }}">
                            Create an account
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
